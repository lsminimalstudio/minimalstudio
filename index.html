<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minimal Studio</title>

<style>

/* =========================
   GLOBAL
========================= */
body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#000;
}

/* =========================
   HERO
========================= */
.hero{
    position:relative;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    overflow:hidden;
    color:#fff;
}

/* BACKGROUND */
.hero-bg{
    position:absolute;
    inset:0;
    z-index:-2;
    transition: transform 0.2s ease-out;
}

/* SLIDES */
.slide{
    position:absolute;
    inset:0;
    background-size:cover;
    background-position:center;
    opacity:0;
    transform:scale(1.15);
    filter:blur(10px);
    transition:opacity 1.5s ease-in-out, filter 1.5s ease-in-out;
}

/* ACTIVE SLIDE */
.slide.active{
    opacity:0.35;
    filter:blur(0px);
    animation:kenburns 6s ease-in-out forwards;
}

/* DARK OVERLAY */
.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.55);
    z-index:-1;
}

/* TEXT */
.hero h2{
    font-size:64px;
    margin:0;
    letter-spacing:-2px;
}

.hero p{
    color:rgba(255,255,255,0.8);
    max-width:500px;
}

/* CTA */
.cta a{
    display:inline-block;
    margin-top:20px;
    background:#fff;
    color:#111;
    padding:12px 24px;
    text-decoration:none;
    border-radius:4px;
    font-weight:bold;
}

/* =========================
   ANIMATION
========================= */
@keyframes kenburns{
    from{ transform:scale(1.15); }
    to{ transform:scale(1.05); }
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">

    <!-- BACKGROUND SLIDES -->
    <div class="hero-bg">
        <div class="slide active" style="background-image:url('https://images.unsplash.com/photo-1578604281362-8afdc29699a0')"></div>
        <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1667594439073-c63131bb63fa')"></div>
        <div class="slide" style="background-image:url('https://images.unsplash.com/photo-1603192399946-8bbb0703cfc4')"></div>
    </div>

    <!-- CONTENT -->
    <h2>Minimal Studio</h2>
    <p>High-end visual content for real estate, brands & experiences</p>

    <div class="cta">
        <a href="#contact">Book a Shoot</a>
    </div>

</div>

<script>

/* =========================
   SLIDESHOW
========================= */
let index = 0;
const slides = document.querySelectorAll('.slide');

function showSlide(i){
    slides.forEach(s => s.classList.remove('active'));
    slides[i].classList.add('active');
}

function nextSlide(){
    index++;
    if(index >= slides.length) index = 0;
    showSlide(index);
}

setInterval(nextSlide, 5000);

/* =========================
   PARALLAX EFFECT
========================= */
window.addEventListener("scroll", () => {
    const bg = document.querySelector(".hero-bg");
    if(bg){
        bg.style.transform = `translateY(${window.scrollY * 0.3}px)`;
    }
});

</script>

</body>
</html>
